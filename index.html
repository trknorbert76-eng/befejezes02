<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Befejezés 02</title>

  <style>
    html, body { height: 100%; }
    body{
      margin:0;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      width:min(960px, 100%);
      margin-top:40px;
      padding:0 12px;
      box-sizing:border-box;
    }

    .videoBox{
      position:relative;
      width:100%;
      padding-bottom:56.25%;
      height:0;
    }

    #player{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    /* ===== Záró szöveg overlay: alul, videó fölött ===== */
    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:flex-end;
      padding-bottom:3%;
      pointer-events:none;
      z-index:9999;
    }

    .note{
      max-width:820px;
      text-align:center;
      line-height:1.55;
      font-size:16px;
      color:rgba(255,255,255,0.92);
      text-shadow:0 2px 10px rgba(0,0,0,0.9);
      padding:0 10px;

      opacity:0;
      transform:translateY(12px);
      transition:opacity .9s ease, transform .9s ease;
    }

    .note.show{
      opacity:1;
      transform:translateY(0);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="videoBox">
      <div id="player"></div>

      <div class="overlay">
        <div id="closingText" class="note">
          Ez a történet nem azt méri,<br>
          hogy jó vagy rossz ember vagy.<br><br>

          Bárhova is kerültél a teszt után,<br>
          nem minősít.<br><br>

          A két lator is egyforma volt.<br><br>

          Csak a végső szorításban<br>
          másképp látták a valóságot.<br><br>

          Az egyik még menteni akarta magát.<br>
          A másik már vállalta a helyzetét.
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    var player;
    var shown = false;
    var SHOW_FROM = 140; // 2:20

    function onYouTubeIframeAPIReady(){
      player = new YT.Player('player', {
        videoId: '5UI77ZQddi4',
        playerVars: {
          modestbranding: 1,
          rel: 0,
          playsinline: 1
        },
        events: { onReady: onReady }
      });
    }

    function onReady(){
      var el = document.getElementById("closingText");

      setInterval(function(){
        if(!player || typeof player.getCurrentTime !== "function") return;

        var t = 0;
        try { t = player.getCurrentTime(); } catch(e){ return; }

        if(t >= SHOW_FROM && !shown){
          el.classList.add("show");
          shown = true;
        }
      }, 400);
    }
  </script>
</body>
</html>
